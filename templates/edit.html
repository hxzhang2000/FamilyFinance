{% extends "base.html" %}

{% block content %}
    <h2>编辑理财记录</h2>
    <form method="POST">
        <div class="form-group">
            <label>产品名称：</label>
            <input type="text" value="{{ record['product_name'] }}" disabled>
        </div>
        
        <div class="form-group">
            <label>购买金额：</label>
            <input type="text" value="{{ "%.2f"|format(record['amount']) }}元" disabled>
        </div>
        
        <div class="form-group">
            <label>预计收益：</label>
    <input type="text" value="{{ "%.2f"|format(record['amount'] * (1 + record['annual_rate']) ** record['duration'] - record['amount']) }}元" disabled>
        </div>
        
        <div class="form-group">
            <label for="actual_profit">实际收益：</label>
            <input type="number" step="0.01" id="actual_profit" name="actual_profit" 
                   value="{{ record['actual_profit'] if record['actual_profit'] else '' }}" required>
        </div>
        
        <button type="submit" class="btn-submit">保存</button>
        <a href="{{ url_for('index') }}" class="btn-cancel">取消</a>
    </form>
{% endblock %}
