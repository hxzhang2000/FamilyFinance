{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h4 class="mb-3"><i class="bi bi-plus-circle"></i> 添加理财记录</h4>

        <form method="POST" action="/add" class="card shadow-sm">
            <div class="card-body">
                <!-- Record Type -->
                <div class="mb-3">
                    <label for="record_type" class="form-label">记录类型</label>
                    <select class="form-select" id="record_type" name="record_type" required onchange="toggleFields()">
                        <option value="purchase" {{ 'selected' if not selected_purchase_id else '' }}>买入</option>
                        <option value="redeem" {{ 'selected' if selected_purchase_id else '' }}>赎回</option>
                    </select>
                </div>

                <!-- Purchase Fields -->
                <div id="purchase-fields">
                    <h6 class="text-success border-bottom pb-2"><i class="bi bi-cart-plus"></i> 买入信息</h6>

                    <div class="mb-3">
                        <label for="product_name" class="form-label">理财产品名称</label>
                        <input type="text" class="form-control" id="product_name" name="product_name" placeholder="例如：交银理财灵动慧利6号90天">
                    </div>

                    <div class="mb-3">
                        <label for="bank_name" class="form-label">银行 / 机构</label>
                        <input type="text" class="form-control" id="bank_name" name="bank_name"
                               list="bank-list" placeholder="选择或输入银行名称">
                        <datalist id="bank-list">
                            <option value="交通银行">
                            <option value="民生银行">
                            <option value="工商银行">
                            <option value="建设银行">
                            <option value="农业银行">
                            <option value="招商银行">
                            <option value="中信银行">
                            <option value="兴业银行">
                            <option value="浦发银行">
                            <option value="其他">
                        </datalist>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="amount" class="form-label">投资金额（元）</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="amount" name="amount" placeholder="100000" required>
                        </div>
                        <div class="col-md-3">
                            <label for="annual_rate" class="form-label">年化利率（%）</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="annual_rate" name="annual_rate" placeholder="1.75" required title="输入百分比，如1.75表示1.75%">
                        </div>
                        <div class="col-md-3">
                            <label for="duration" class="form-label">期限（天）</label>
                            <input type="number" min="1" class="form-control" id="duration" name="duration" placeholder="90" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="purchase_date" class="form-label">购买日期</label>
                        <input type="date" class="form-control" id="purchase_date" name="purchase_date" required>
                    </div>
                </div>

                <!-- Redeem Fields -->
                <div id="redeem-fields" style="display: none;">
                    <h6 class="text-warning border-bottom pb-2"><i class="bi bi-cart-dash"></i> 赎回信息</h6>

                    <div class="mb-3">
                        <label for="purchase_record_id" class="form-label">选择买入记录</label>
                        <select class="form-select" id="purchase_record_id" name="purchase_record_id">
                            {% for record in purchase_records %}
                            <option value="{{ record['id'] }}" data-amount="{{ record['amount'] }}"
                                    {{ 'selected' if record['id'] == selected_purchase_id else '' }}>
                                {{ record['product_name'] }} — ¥{{ "%.2f"|format(record['amount']) }} ({{ record['purchase_date'] }})
                                {% if record.get('bank_name') and record['bank_name'] != '未知银行' %}
                                · {{ record['bank_name'] }}
                                {% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="redeem_amount" class="form-label">赎回金额（元）</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="redeem_amount" name="redeem_amount" placeholder="100000">
                        </div>
                        <div class="col-md-6">
                            <label for="redeem_date" class="form-label">赎回日期</label>
                            <input type="date" class="form-control" id="redeem_date" name="redeem_date">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">收益计算方式</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="profit_calc" id="auto_calc" value="auto" checked>
                            <label class="form-check-label" for="auto_calc">自动计算（按年化利率复利）</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="profit_calc" id="manual_calc" value="manual">
                            <label class="form-check-label" for="manual_calc">手动输入实际收益</label>
                        </div>
                    </div>

                    <div class="mb-3 manual-profit" style="display: none;">
                        <label for="actual_profit" class="form-label">实际收益金额（元）</label>
                        <input type="number" step="0.01" class="form-control" id="actual_profit" name="actual_profit" min="0" placeholder="511.00">
                        <div class="form-text text-muted">请输入实际获得的收益金额</div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> 提交</button>
                    <a href="/" class="btn btn-outline-secondary"><i class="bi bi-x-lg"></i> 取消</a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
function toggleFields() {
    const recordType = document.getElementById('record_type').value;
    document.getElementById('purchase-fields').style.display = recordType === 'purchase' ? 'block' : 'none';
    document.getElementById('redeem-fields').style.display = recordType === 'redeem' ? 'block' : 'none';
}

function autoFillRedeemAmount() {
    const select = document.getElementById('purchase_record_id');
    const selected = select.options[select.selectedIndex];
    const amount = selected ? selected.getAttribute('data-amount') : '';
    const amountInput = document.getElementById('redeem_amount');
    if (amount && amountInput && !amountInput.value) {
        amountInput.value = amount;
    }
}

document.addEventListener('DOMContentLoaded', function() {
    // Auto-switch to redeem mode and pre-fill if purchase_id was passed
    const recordType = document.getElementById('record_type').value;
    if (recordType === 'redeem') {
        toggleFields();
        autoFillRedeemAmount();
    }

    // Also auto-fill when user changes the purchase selection
    const purchaseSelect = document.getElementById('purchase_record_id');
    if (purchaseSelect) {
        purchaseSelect.addEventListener('change', autoFillRedeemAmount);
    }

    // Manual profit toggle
    const manualProfitSection = document.querySelector('.manual-profit');
    const calcRadios = document.querySelectorAll('input[name="profit_calc"]');

    function toggleManualProfit() {
        const isManual = document.getElementById('manual_calc').checked;
        manualProfitSection.style.display = isManual ? 'block' : 'none';
        document.getElementById('actual_profit').required = isManual;
    }

    calcRadios.forEach(radio => {
        radio.addEventListener('change', toggleManualProfit);
    });
});
</script>
{% endblock %}
